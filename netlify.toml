# Pins the build + publish dir so the SPA fallback is deterministic regardless
# of dashboard settings. The redirect makes any deep link (e.g. /consults,
# /settings/billing) serve the app shell, so a hard refresh keeps the route
# instead of 404ing. Static files in dist (assets, landing.html) are served
# directly and are unaffected by the catch-all.
[build]
  command = "npm run build"
  publish = "dist"

# Pin Node so the build matches the version the lockfile was generated with.
# Without this, Netlify's default Node can differ from local and npm errors
# out parsing versions ("npm error Invalid Version:") during install.
[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
