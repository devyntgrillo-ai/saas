# Pins the build + publish dir so the SPA fallback is deterministic regardless
# of dashboard settings. The redirect makes any deep link (e.g. /consults,
# /settings/billing) serve the app shell, so a hard refresh keeps the route
# instead of 404ing. Static files in dist (assets, landing.html) are served
# directly and are unaffected by the catch-all.
[build]
  command = "npm run build"
  publish = "dist"

# Pin Node so the build matches the version the lockfile was generated with.
# Without this, Netlify's default Node can differ from local and npm errors
# out parsing versions ("npm error Invalid Version:") during install.
[build.environment]
  NODE_VERSION = "20"

# HIPAA transport security: force HTTPS. Netlify also serves over HTTPS by default
# (and has a "Force HTTPS" toggle), but this makes the 301 upgrade explicit and
# guarantees any http:// request is permanently redirected to https://. Declared
# before the SPA catch-all so the scheme upgrade wins.
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

# Security headers applied to every response. CSP carries upgrade-insecure-requests
# so any stray http:// subresource is auto-upgraded to https; HSTS pins HTTPS in
# the browser for a year (with subdomains + preload).
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "upgrade-insecure-requests"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

# SPA fallback: every deep link serves the app shell (keep last so it doesn't
# shadow the scheme-upgrade redirect above).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
